<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Minimal nonprofit operations dashboard board</title>
  <desc id="desc">Top-down flat lay of a clean task assignment and progress tracking board with soft light pink and white tones.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7fa"/>
      <stop offset="100%" stop-color="#fdf2f6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7e3250" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <rect x="90" y="72" width="1420" height="856" rx="26" fill="#ffffff" stroke="#f1dce5" stroke-width="2" filter="url(#softShadow)"/>

  <rect x="130" y="112" width="420" height="84" rx="18" fill="#fff6f9" stroke="#f3d8e4"/>
  <text x="160" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#7f1d3e">Operations Dashboard</text>

  <rect x="1100" y="112" width="370" height="84" rx="18" fill="#fff6f9" stroke="#f3d8e4"/>
  <text x="1132" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#8a3a57">Live Progress</text>
  <rect x="1132" y="160" width="300" height="14" rx="8" fill="#f3dbe4"/>
  <rect x="1132" y="160" width="198" height="14" rx="8" fill="#b14d76"/>

  <g transform="translate(130 236)">
    <rect width="430" height="640" rx="20" fill="#fff9fb" stroke="#f2dce6"/>
    <text x="28" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#7f1d3e">To Assign</text>

    <rect x="26" y="70" width="378" height="154" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Food Kit Distribution</text>
    <text x="46" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Priority: High</text>
    <text x="46" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Assigned: 0 volunteers</text>

    <rect x="26" y="244" width="378" height="154" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Water Supply Routing</text>
    <text x="46" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Priority: Medium</text>
    <text x="46" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Blocks: 4 villages</text>

    <rect x="26" y="418" width="378" height="154" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Medical Visit Queue</text>
    <text x="46" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Priority: High</text>
    <text x="46" y="518" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Cases: 12 pending</text>
  </g>

  <g transform="translate(585 236)">
    <rect width="430" height="640" rx="20" fill="#fff9fb" stroke="#f2dce6"/>
    <text x="28" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#7f1d3e">In Progress</text>

    <rect x="26" y="70" width="378" height="222" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Volunteer Mapping</text>
    <text x="46" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Team: 8 active</text>
    <text x="46" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Coverage: 62%</text>
    <rect x="46" y="196" width="320" height="12" rx="7" fill="#f3dbe4"/>
    <rect x="46" y="196" width="198" height="12" rx="7" fill="#b14d76"/>

    <rect x="26" y="314" width="378" height="258" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="356" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Task Assignment Matrix</text>
    <rect x="46" y="376" width="320" height="170" rx="12" fill="#fff6f9" stroke="#f1dce5"/>
    <line x1="46" y1="433" x2="366" y2="433" stroke="#f1dce5"/>
    <line x1="46" y1="490" x2="366" y2="490" stroke="#f1dce5"/>
    <line x1="153" y1="376" x2="153" y2="546" stroke="#f1dce5"/>
    <line x1="260" y1="376" x2="260" y2="546" stroke="#f1dce5"/>
    <circle cx="99" cy="404" r="8" fill="#b14d76"/>
    <circle cx="206" cy="461" r="8" fill="#b14d76"/>
    <circle cx="313" cy="518" r="8" fill="#b14d76"/>
  </g>

  <g transform="translate(1040 236)">
    <rect width="430" height="640" rx="20" fill="#fff9fb" stroke="#f2dce6"/>
    <text x="28" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#7f1d3e">Completed</text>

    <rect x="26" y="70" width="378" height="154" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Shelter Allocation</text>
    <text x="46" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Families supported: 45</text>
    <text x="46" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Status: Closed</text>

    <rect x="26" y="244" width="378" height="154" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Education Supplies</text>
    <text x="46" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Kits delivered: 120</text>
    <text x="46" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Status: Verified</text>

    <rect x="26" y="418" width="378" height="154" rx="16" fill="#ffffff" stroke="#efd8e2"/>
    <text x="46" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#4f2538">Health Camp Setup</text>
    <text x="46" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Volunteers: 22</text>
    <text x="46" y="518" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#6c4a59">Status: Completed</text>
  </g>
</svg>
